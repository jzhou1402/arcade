# ghostty-linear tmux config. Loaded via:  tmux -f ~/.config/ghostty-linear/tmux.conf
# Drives the Linear dashboard + per-ticket claude sessions.

set -g prefix C-b
set -g mouse on
set -sg escape-time 10
set -g history-limit 50000
set -g focus-events on

# True color for Ghostty.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# The window name IS the custom title (APP-223 three words ·#42); surface it to Ghostty.
set -g set-titles on
set -g set-titles-string "#W"
set -g allow-rename off
set -g automatic-rename off
set -g renumber-windows on

# --- ghostty-linear bindings (reached from Ghostty's cmd+N/G/Y -> prefix+n/g/y) ---
GL_BIN="$HOME/.config/ghostty-linear/bin"
bind n run-shell "$GL_BIN/gl-open"     # cmd+N: open/attach the selected ticket
bind g run-shell "$GL_BIN/gl-return"   # cmd+G: back to the dashboard
bind y run-shell "$GL_BIN/gl-split"    # cmd+Y: toggle dashboard|claude split
bind r run-shell "$GL_BIN/gl-fetch"    # prefix+r: refresh tickets
bind D run-shell "$GL_BIN/gl-return"

# Sensible splits/reload for ad-hoc use.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind R source-file "$HOME/.config/ghostty-linear/tmux.conf" \; display "reloaded"

# Status bar.
set -g status-style "bg=default"
set -g status-left "#[bold] hazel #[default]"
set -g status-left-length 20
set -g status-right "#[dim]%a %H:%M "
set -g window-status-current-style "bold"

# --- persistence across reboots (TPM + resurrect + continuum) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes '"~claude --continue --dangerously-skip-permissions"'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run "$HOME/.tmux/plugins/tpm/tpm"
